<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StickerDrop — Share to Snapchat</title>

  <!-- Snapchat Creative Kit meta tags (set dynamically below) -->
  <meta id="snapSticker" property="snapchat:sticker" content="">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(145deg, #FFF0FA 0%, #F0EEFF 40%, #FFF8E7 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      gap: 1.5rem;
    }

    .logo {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      background: linear-gradient(135deg, #7C3AED 0%, #EC4899 55%, #F59E0B 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sticker-preview {
      width: 220px;
      height: 220px;
      border-radius: 24px;
      object-fit: contain;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      animation: pop-in 0.35s cubic-bezier(0.34,1.56,0.64,1);
      display: none;
    }
    .sticker-preview.show { display: block; }

    @keyframes pop-in {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .label {
      font-size: 1.05rem;
      font-weight: 800;
      color: #6B7280;
      text-align: center;
    }

    .snap-btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .snap-hint {
      font-size: 0.82rem;
      color: #9CA3AF;
      font-weight: 700;
      text-align: center;
      max-width: 260px;
      line-height: 1.5;
    }

    .back-link {
      font-size: 0.85rem;
      color: #7C3AED;
      font-weight: 800;
      text-decoration: none;
      margin-top: 0.5rem;
    }
    .back-link:hover { text-decoration: underline; }

    .loading {
      font-size: 0.95rem;
      font-weight: 800;
      color: #7C3AED;
    }

    .error {
      color: #DC2626;
      font-weight: 800;
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="logo">StickerDrop ✨</div>

  <img class="sticker-preview" id="stickerPreview" alt="Your sticker">

  <div class="loading" id="loadingMsg">Loading your sticker…</div>
  <div class="error" id="errorMsg" style="display:none"></div>

  <div class="snap-btn-wrap" id="snapBtnWrap" style="display:none">
    <div class="label">Tap to add your sticker to Snapchat 👇</div>
    <div class="snapchat-creative-kit-share"
         id="snapShareBtn"
         data-theme="light"
         data-size="large">
    </div>
    <div class="snap-hint">Opens Snapchat camera with your sticker ready to place ✨</div>
  </div>

  <a class="back-link" href="/">← Make another sticker</a>

<script>
  const params = new URLSearchParams(window.location.search);
  const stickerUrl = params.get('url');

  if (!stickerUrl) {
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('errorMsg').textContent = 'No sticker URL provided.';
  } else {
    // Set the meta tag dynamically
    document.getElementById('snapSticker').setAttribute('content', stickerUrl);

    // Show preview
    const img = document.getElementById('stickerPreview');
    img.src = stickerUrl;
    img.onload = () => {
      document.getElementById('loadingMsg').style.display = 'none';
      img.classList.add('show');
      document.getElementById('snapBtnWrap').style.display = 'flex';

      // Set the share URL to current page so Snapchat reads the meta tag
      document.getElementById('snapShareBtn').setAttribute('data-share-url', window.location.href);

      // Load Snapchat Creative Kit SDK
      (function (d, s, id) {
        var js, sjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s);
        js.id = id;
        js.src = 'https://sdk.snapkit.com/js/v1/create.js';
        sjs.parentNode.insertBefore(js, sjs);
      })(document, 'script', 'snapkit-creative-kit-sdk');
    };
    img.onerror = () => {
      document.getElementById('loadingMsg').style.display = 'none';
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('errorMsg').textContent = 'Could not load sticker. Please go back and try again.';
    };
  }
</script>

</body>
</html>
