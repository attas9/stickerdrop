<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StickerDrop ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Lalezar&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:       #7C3AED;
      --primary-light: #EDE9FE;
      --accent:        #F59E0B;
      --accent2:       #EC4899;
      --accent3:       #10B981;
      --text:          #1F2937;
      --text-muted:    #6B7280;
      --white:         #FFFFFF;
      --shadow:        0 4px 24px rgba(0,0,0,0.09);
      --radius:        24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(145deg, #FFF0FA 0%, #F0EEFF 40%, #FFF8E7 100%);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 2.25rem 1rem 0.75rem;
    }

    .header-deco {
      font-size: 1.6rem;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }

    .logo {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.6rem, 7vw, 4rem);
      background: linear-gradient(135deg, #7C3AED 0%, #EC4899 55%, #F59E0B 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .tagline {
      font-size: 1.05rem;
      color: var(--text-muted);
      font-weight: 700;
      margin-top: 0.3rem;
    }

    /* ── Container ── */
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 1rem 1.25rem 5rem;
    }

    /* ── API Key Setup banner (unchanged) ── */
    .api-setup {
      background: #FFFBEB;
      border: 2.5px dashed var(--accent);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .api-setup.visible { display: block; }

    .api-setup-label {
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem;
      color: #92400E;
      margin-bottom: 0.7rem;
    }

    .api-setup-row {
      display: flex;
      gap: 0.5rem;
    }

    .api-key-input {
      flex: 1;
      padding: 0.55rem 1rem;
      border: 2px solid #FCD34D;
      border-radius: 100px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      outline: none;
      background: white;
      transition: border-color 0.2s;
    }
    .api-key-input:focus { border-color: var(--accent); }

    .api-save-btn {
      padding: 0.55rem 1.2rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 100px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .api-save-btn:hover { opacity: 0.88; }

    .api-hint { font-size: 0.78rem; color: #92400E; margin-top: 0.45rem; }
    .api-hint a { color: #92400E; }

    /* ── Step block wrapper ── */
    .step-block {
      background: var(--white);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.1rem;
      box-shadow: var(--shadow);
      border: 2.5px solid transparent;
      transition: border-color 0.25s;
    }
    .step-block.complete { border-color: #A7F3D0; }

    .step-header {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 1.1rem;
    }

    .step-num {
      background: var(--primary);
      color: white;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
      font-weight: 800;
    }

    .step-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: var(--primary);
    }

    .optional-tag {
      font-size: 0.82rem;
      color: #9CA3AF;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      margin-left: 0.2rem;
    }

    /* ── Step reveal animation ── */
    .step-reveal {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transform: translateY(16px);
      transition: max-height 0.55s ease, opacity 0.45s ease, transform 0.45s ease;
    }
    .step-reveal.visible {
      max-height: 900px;
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Step 1: Language cards ── */
    .lang-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .lang-card {
      padding: 2rem 1rem;
      border-radius: var(--radius);
      border: 3px solid #E5E7EB;
      background: white;
      cursor: pointer;
      transition: all 0.22s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      box-shadow: var(--shadow);
    }

    .lang-card:hover {
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: 0 10px 32px rgba(124,58,237,0.2);
    }

    .lang-card.active {
      border-color: var(--primary);
      background: var(--primary-light);
      transform: translateY(-4px);
      box-shadow: 0 10px 32px rgba(124,58,237,0.2);
    }

    .lang-flag  { font-size: 3rem; line-height: 1; }
    .lang-label {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      color: var(--primary);
    }
    .lang-sublabel {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 700;
    }

    /* ── Step 2: Vibe cards ── */
    .vibe-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.85rem;
    }

    .vibe-card {
      padding: 1.35rem 0.9rem;
      border-radius: var(--radius);
      border: 3px solid #E5E7EB;
      background: white;
      cursor: pointer;
      transition: all 0.22s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .vibe-card:hover {
      border-color: var(--accent2);
      transform: translateY(-4px);
      box-shadow: 0 10px 32px rgba(236,72,153,0.2);
    }

    .vibe-card.active {
      border-color: var(--accent2);
      background: #FDF2F8;
      transform: translateY(-4px);
      box-shadow: 0 10px 32px rgba(236,72,153,0.2);
    }

    .vibe-emoji { font-size: 2.2rem; line-height: 1; }
    .vibe-title {
      font-family: 'Fredoka One', cursive;
      font-size: 0.92rem;
      color: var(--primary);
      line-height: 1.2;
    }
    .vibe-desc {
      font-size: 0.74rem;
      color: var(--text-muted);
      font-weight: 600;
      line-height: 1.3;
    }

    /* ── Step 3: Message input ── */
    .msg-input {
      width: 100%;
      padding: 0.8rem 1.1rem;
      border: 2px solid #E5E7EB;
      border-radius: 16px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      background: white;
      resize: none;
      min-height: 72px;
      color: var(--text);
    }
    .msg-input:focus { border-color: var(--primary); }
    .msg-input::placeholder { color: #D1D5DB; font-weight: 600; }

    /* ── Generate Button ── */
    .generate-btn {
      width: 100%;
      padding: 1rem 2rem;
      border: none;
      border-radius: 100px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.35rem;
      cursor: pointer;
      background: linear-gradient(135deg, #7C3AED 0%, #EC4899 100%);
      color: white;
      box-shadow: 0 6px 22px rgba(124,58,237,0.38);
      letter-spacing: 0.4px;
      transition: all 0.2s;
      margin-bottom: 0.5rem;
    }
    .generate-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(124,58,237,0.45);
    }
    .generate-btn:active:not(:disabled) { transform: translateY(0); }
    .generate-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ── Result Section ── */
    .result-section {
      background: var(--white);
      border-radius: var(--radius);
      padding: 2rem 1.5rem;
      text-align: center;
      box-shadow: var(--shadow);
      margin-top: 1.1rem;
      display: none;
    }
    .result-section.visible { display: block; }

    .result-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      color: var(--primary);
      margin-bottom: 1.25rem;
    }

    /* ── Loading ── */
    .loading-wrap {
      width: 260px;
      height: 260px;
      border-radius: 20px;
      background: linear-gradient(135deg, #F3E8FF, #FCE7F3, #FEF3C7);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin: 0 auto 1.5rem;
    }
    .loading-wrap.show { display: flex; }

    .loading-emoji {
      font-size: 3.2rem;
      animation: spin-bounce 1s ease-in-out infinite alternate;
    }

    @keyframes spin-bounce {
      from { transform: translateY(0) rotate(-8deg) scale(0.95); }
      to   { transform: translateY(-14px) rotate(8deg) scale(1.05); }
    }

    .loading-dots { display: flex; gap: 7px; }
    .loading-dots span {
      width: 11px; height: 11px;
      border-radius: 50%;
      animation: dot-pulse 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(1) { background: var(--primary);  animation-delay: 0s; }
    .loading-dots span:nth-child(2) { background: var(--accent2);  animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { background: var(--accent);   animation-delay: 0.4s; }

    @keyframes dot-pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.75); }
      40%           { opacity: 1;   transform: scale(1.25); }
    }

    .loading-text { font-weight: 800; color: var(--primary); font-size: 0.95rem; }

    /* ── Sticker image ── */
    .sticker-wrap { display: none; }
    .sticker-wrap.show { display: inline-block; }

    .sticker-img {
      width: 280px;
      height: 280px;
      border-radius: 20px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 0 1px white) drop-shadow(0 0 5px rgba(0,0,0,0.2));
      animation: pop-in 0.35s cubic-bezier(0.34,1.56,0.64,1);
      margin-bottom: 1.5rem;
    }

    @keyframes pop-in {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* ── Error box ── */
    .error-box {
      background: #FEF2F2;
      border: 2px solid #FECACA;
      border-radius: 12px;
      padding: 0.9rem 1.4rem;
      color: #DC2626;
      font-weight: 700;
      margin-bottom: 1rem;
      display: none;
    }
    .error-box.show { display: block; }

    /* ── Action buttons ── */
    .action-btns { display: none; gap: 0.7rem; justify-content: center; flex-wrap: wrap; }
    .action-btns.show { display: flex; }

    .action-btn {
      padding: 0.6rem 1.2rem;
      border-radius: 100px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.92rem;
      cursor: pointer;
      transition: all 0.15s;
      border: 2px solid transparent;
    }
    .action-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.14); }

    .btn-download { background: var(--accent3); color: white; border-color: var(--accent3); }
    .btn-again    { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .btn-reset    { background: #FEE2E2; color: #DC2626; border-color: #FECACA; }

    /* ── Settings cog ── */
    .settings-btn {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 46px; height: 46px;
      border-radius: 50%;
      background: white;
      border: 2.5px solid #E5E7EB;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s;
    }
    .settings-btn:hover { transform: rotate(35deg); }

    /* ── RTL support ── */
    [dir="rtl"] .step-header { flex-direction: row-reverse; }
    [dir="rtl"] .msg-input   { text-align: right; direction: rtl; }
    [dir="rtl"] .text-overlay { direction: rtl; }
    [dir="rtl"] .lang-cards  { direction: rtl; }
    [dir="rtl"] .optional-tag { margin-left: 0; margin-right: 0.2rem; }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .sticker-img  { width: 240px; height: 240px; }
      .loading-wrap { width: 240px; height: 240px; }
      .lang-card    { padding: 1.5rem 0.75rem; }
      .lang-flag    { font-size: 2.4rem; }
      .lang-label   { font-size: 1.1rem; }
      .vibe-card    { padding: 1.1rem 0.7rem; }
      .vibe-emoji   { font-size: 1.8rem; }
      .step-block   { padding: 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-deco">✨ 🎨 ⭐</div>
  <div class="logo">StickerDrop</div>
  <div class="tagline" id="tagline">AI-powered stickers, zero effort ✌️</div>
</header>

<div class="container">

  <!-- API Key banner (logic unchanged) -->
  <div class="api-setup" id="apiSetup">
    <div class="api-setup-label">🔑 Gemini API Key Required</div>
    <div class="api-setup-row">
      <input type="password" class="api-key-input" id="apiKeyInput" placeholder="Paste your Gemini API key…">
      <button class="api-save-btn" onclick="saveApiKey()">Save</button>
    </div>
    <p class="api-hint">Stored locally in your browser only. Get a free key at <a href="https://ai.google.dev" target="_blank">ai.google.dev</a></p>
  </div>

  <!-- Step 1: Language -->
  <div class="step-block" id="step1Block">
    <div class="step-header">
      <span class="step-num">1</span>
      <span class="step-title" id="label1">Choose your language</span>
    </div>
    <div class="lang-cards">
      <button class="lang-card" id="cardAR" onclick="selectLang('AR')">
        <span class="lang-flag">🇸🇦</span>
        <span class="lang-label" style="font-family:'Lalezar',sans-serif;font-size:1.5rem;">عربي</span>
        <span class="lang-sublabel">Arabic</span>
      </button>
      <button class="lang-card" id="cardEN" onclick="selectLang('EN')">
        <span class="lang-flag">🇬🇧</span>
        <span class="lang-label">English</span>
        <span class="lang-sublabel">إنجليزي</span>
      </button>
    </div>
  </div>

  <!-- Step 2: Vibe (revealed after language) -->
  <div class="step-reveal" id="step2Reveal">
    <div class="step-block" id="step2Block">
      <div class="step-header">
        <span class="step-num">2</span>
        <span class="step-title" id="label2">Pick your vibe</span>
      </div>
      <div class="vibe-grid" id="vibeGrid"></div>
    </div>
  </div>

  <!-- Step 3: Message (revealed after vibe) -->
  <div class="step-reveal" id="step3Reveal">
    <div class="step-block" id="step3Block">
      <div class="step-header">
        <span class="step-num">3</span>
        <span class="step-title" id="label3">Add your message</span>
        <span class="optional-tag" id="optionalTag">(optional)</span>
      </div>
      <textarea class="msg-input" id="msgInput" rows="2" placeholder="e.g. يا حبيبي / Say Something…" maxlength="120"></textarea>
    </div>
  </div>

  <!-- Generate (revealed after vibe) -->
  <div class="step-reveal" id="genReveal">
    <button class="generate-btn" id="generateBtn" onclick="generate()" disabled>
      ✨ <span id="btnLabel">Generate Sticker</span>
    </button>
  </div>

  <!-- Result -->
  <div class="result-section" id="resultSection">
    <div class="result-title" id="resultTitle">Your sticker is ready! 🎉</div>

    <div class="loading-wrap" id="loadingWrap">
      <div class="loading-emoji">🎨</div>
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div class="loading-text" id="loadingText">Crafting your sticker…</div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div class="sticker-wrap" id="stickerWrap">
      <img class="sticker-img" id="stickerImg" alt="Generated sticker">
    </div>

    <div class="action-btns" id="actionBtns">
      <button class="action-btn btn-download" id="btnDownload" onclick="downloadSticker()">⬇ Download</button>
      <button class="action-btn btn-again"    id="btnAgain"    onclick="tryAgain()">🔄 Try Again</button>
      <button class="action-btn btn-reset"    id="btnReset"    onclick="startOver()">🔁 Start Over</button>
    </div>
  </div>

</div>

<button class="settings-btn" onclick="toggleApiSetup()" title="API Settings">⚙️</button>

<script>
  /* ── Vibe Definitions ── */
  const VIBES = [
    {
      id: 'funny',
      emoji: '😂',
      titleEN: 'Funny / Sarcastic',
      titleAR: 'كوميدي / ساخر',
      descEN: 'Minimalist memes & reaction faces',
      descAR: 'ميمز ووجوه ساخرة',
      promptStyle: 'Minimalist hand-drawn line art sticker, sarcastic cartoon expression, clean white background, high-contrast meme style, bold outlines. No text, no letters, no words.',
      fontAR: 'Lalezar',
      textStyleClass: 'style-outlined',
    },
    {
      id: 'aesthetic',
      emoji: '✨',
      titleEN: 'Aesthetic / Pop-Art',
      titleAR: 'جمالي / بوب آرت',
      descEN: 'Vibrant Khaleeji pop-art vectors',
      descAR: 'فن بوب خليجي زاهي الألوان',
      promptStyle: 'Professional vector illustration, vibrant saturated colors, bold outlines, sticker-cut pop-art style, white background, clean glossy look. No text, no letters, no words.',
      fontAR: 'Lalezar',
      textStyleClass: 'style-outlined',
    },
    {
      id: 'nostalgic',
      emoji: '📜',
      titleEN: 'Nostalgic / Retro',
      titleAR: 'نوستالجيا / ريترو',
      descEN: '1980s Saudi aesthetic, film grain',
      descAR: 'أجواء الثمانينات السعودية',
      promptStyle: 'Vintage 1980s Saudi pop-culture aesthetic, grainy analog film texture, nostalgic muted retro colors, warm tones, vintage album cover style, white background. No text, no letters, no words.',
      fontAR: 'Amiri',
      textStyleClass: 'style-retro',
    },
    {
      id: 'systemAlert',
      emoji: '💬',
      titleEN: 'System Alert',
      titleAR: 'تنبيه النظام',
      descEN: 'iOS notification & error banners',
      descAR: 'إشعارات وأخطاء بالعربي',
      promptStyle: 'Flat iOS system notification banner design, clean white UI card, subtle shadow, app icon placeholder, ultra minimal clean design, white background. No text, no letters, no words.',
      fontAR: 'Lalezar',
      textStyleClass: 'style-ios',
    },
  ];

  /* ── UI copy (bilingual) ── */
  const COPY = {
    EN: {
      tagline:     'AI-powered stickers, zero effort ✌️',
      label1:      'Choose your language',
      label2:      'Pick your vibe',
      label3:      'Add your message',
      optional:    '(optional)',
      btnLabel:    'Generate Sticker',
      loading:     'Crafting your sticker…',
      ready:       'Your sticker is ready! 🎉',
      oops:        'Oops! Something went wrong 😅',
      download:    '⬇ Download',
      again:       '🔄 Try Again',
      reset:       '🔁 Start Over',
      placeholder: 'Say something…',
    },
    AR: {
      tagline:     'ستيكرات بالذكاء الاصطناعي، بدون تعب ✌️',
      label1:      'اختر لغتك',
      label2:      'اختر الطابع',
      label3:      'أضف رسالتك',
      optional:    '(اختياري)',
      btnLabel:    'اصنع ستيكر',
      loading:     '…يتم تصميم ستيكرك',
      ready:       '🎉 ستيكرك جاهز',
      oops:        '😅 !حدث خطأ ما',
      download:    '⬇ تحميل',
      again:       '🔄 مرة ثانية',
      reset:       '🔁 من البداية',
      placeholder: '…يا حبيبي',
    },
  };

  /* ── State ── */
  const state = {
    lang:   null,   // 'EN' | 'AR'
    vibe:   null,   // vibe id string
    message:'',
    apiKey: localStorage.getItem('gemini_api_key') || '',
  };

  /* ── Boot ── */
  function init() {
    renderVibeCards();

    document.getElementById('msgInput').addEventListener('input', e => {
      state.message = e.target.value;
    });

    if (!state.apiKey) document.getElementById('apiSetup').classList.add('visible');
    updateBtn();
  }

  /* ── Render vibe cards ── */
  function renderVibeCards() {
    const grid = document.getElementById('vibeGrid');
    grid.innerHTML = '';
    VIBES.forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'vibe-card';
      btn.id = 'vibe_' + v.id;
      const lang = state.lang || 'EN';
      btn.innerHTML = `
        <span class="vibe-emoji">${v.emoji}</span>
        <span class="vibe-title">${lang === 'AR' ? v.titleAR : v.titleEN}</span>
        <span class="vibe-desc">${lang === 'AR' ? v.descAR : v.descEN}</span>
      `;
      btn.onclick = () => selectVibe(v.id);
      grid.appendChild(btn);
    });
  }

  /* ── Language selection ── */
  function selectLang(lang) {
    state.lang = lang;

    // Card active state
    document.getElementById('cardEN').classList.toggle('active', lang === 'EN');
    document.getElementById('cardAR').classList.toggle('active', lang === 'AR');

    // Document direction + lang
    document.getElementById('htmlRoot').lang = lang === 'AR' ? 'ar' : 'en';
    document.body.dir = lang === 'AR' ? 'rtl' : 'ltr';

    // Update all copy
    applyCopy(lang);

    // Mark step 1 complete
    document.getElementById('step1Block').classList.add('complete');

    // Reveal step 2
    revealStep('step2Reveal');

    // Re-render vibe cards in chosen language
    renderVibeCards();

    // If vibe was already picked (language switch), update overlay font
    if (state.vibe) applyTextOverlay();

    updateBtn();
  }

  /* ── Apply bilingual copy ── */
  function applyCopy(lang) {
    const c = COPY[lang];
    document.getElementById('tagline').textContent     = c.tagline;
    document.getElementById('label1').textContent      = c.label1;
    document.getElementById('label2').textContent      = c.label2;
    document.getElementById('label3').textContent      = c.label3;
    document.getElementById('optionalTag').textContent = c.optional;
    document.getElementById('btnLabel').textContent    = c.btnLabel;
    document.getElementById('loadingText').textContent = c.loading;
    document.getElementById('btnDownload').textContent = c.download;
    document.getElementById('btnAgain').textContent    = c.again;
    document.getElementById('btnReset').textContent    = c.reset;
    document.getElementById('msgInput').placeholder    = c.placeholder;
  }

  /* ── Vibe selection ── */
  function selectVibe(id) {
    state.vibe = id;

    document.querySelectorAll('.vibe-card').forEach(c => c.classList.remove('active'));
    document.getElementById('vibe_' + id).classList.add('active');
    document.getElementById('step2Block').classList.add('complete');

    // Reveal step 3 and generate
    revealStep('step3Reveal');
    revealStep('genReveal');

    updateBtn();
  }

  /* ── Reveal helper ── */
  function revealStep(id) {
    const el = document.getElementById(id);
    if (el.classList.contains('visible')) return;
    el.classList.add('visible');
  }

  /* ── Update generate button ── */
  function updateBtn() {
    document.getElementById('generateBtn').disabled = !(state.lang && state.vibe);
  }

  /* ── API key management (unchanged) ── */
  function saveApiKey() {
    const val = document.getElementById('apiKeyInput').value.trim();
    if (!val) return;
    state.apiKey = val;
    localStorage.setItem('gemini_api_key', val);
    document.getElementById('apiSetup').classList.remove('visible');
  }

  function toggleApiSetup() {
    document.getElementById('apiSetup').classList.toggle('visible');
  }

  /* ─────────────── Generation ─────────────── */
  async function generate() {
    if (!state.lang || !state.vibe) return;
    if (!state.apiKey) {
      document.getElementById('apiSetup').classList.add('visible');
      return;
    }

    setUIState('loading');

    try {
      const prompt = await buildPromptWithGemini();
      await renderSticker(prompt);
    } catch (err) {
      console.error(err);
      setUIState('error', err.message || 'Something went wrong — please try again.');
    }
  }

  async function buildPromptWithGemini() {
    const vibe = VIBES.find(v => v.id === state.vibe);
    const langLabel = state.lang === 'AR' ? 'Arabic' : 'English';

    const messageClause = state.message.trim()
      ? `Include the text "${state.message.trim()}" written in stylized ${langLabel} font, integrated naturally into the sticker design.`
      : 'No text on the sticker.';

    const instruction =
      `You are a creative AI image prompt writer for digital stickers.\n` +
      `Generate a detailed image generation prompt for a sticker with this exact visual style:\n` +
      `${vibe.promptStyle}\n\n` +
      `Target audience language: ${langLabel}.\n` +
      `${messageClause}\n` +
      `The sticker must have: white background, thick bold sticker outline, centered composition, high quality.\n\n` +
      `Reply with ONLY the image generation prompt — no explanation, no markdown. Just the raw prompt text.`;

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${state.apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: instruction }] }] })
      }
    );

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      const msg = errData?.error?.message || `Gemini API error (${res.status})`;
      console.warn('Gemini text model failed, using local prompt:', msg);
      return buildLocalPrompt();
    }

    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
    if (!text) return buildLocalPrompt();
    return text;
  }

  function buildLocalPrompt() {
    const vibe = VIBES.find(v => v.id === state.vibe);
    const msgPart = state.message.trim()
      ? `, with the text "${state.message.trim()}" stylized in the design`
      : '';
    return `${vibe.promptStyle}${msgPart}. White background, bold sticker outline, centered, high quality, crisp details.`;
  }

  /* ── AI Image Generation (core logic unchanged) ── */
  const STICKER_SUFFIX = 'sticker, white background, bold outline, centered, high contrast';

  async function generateImage(prompt) {
    const full = `${prompt}, ${STICKER_SUFFIX}`;

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image:generateContent?key=${state.apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: full }] }],
          generationConfig: { responseModalities: ['IMAGE'] }
        })
      }
    );

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `Gemini image error (${res.status})`);
    }

    const data = await res.json();
    const part = data?.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
    if (!part) throw new Error('Gemini returned no image — try again.');

    const { mimeType, data: b64 } = part.inlineData;
    return `data:${mimeType};base64,${b64}`;
  }

  async function renderSticker(prompt) {
    const dataUrl = await generateImage(prompt);
    return loadImageURL(dataUrl);
  }

  function loadImageURL(url) {
    return new Promise((resolve, reject) => {
      const img = document.getElementById('stickerImg');
      img.onload = () => { setUIState('result'); resolve(); };
      img.onerror = () => reject(new Error('Could not render image — try again.'));
      img.src = '';
      img.src = url;
    });
  }


  /* ─────────────── UI State Machine ─────────────── */
  function setUIState(mode, message) {
    const lang       = state.lang || 'EN';
    const c          = COPY[lang];
    const section    = document.getElementById('resultSection');
    const loadWrap   = document.getElementById('loadingWrap');
    const errBox     = document.getElementById('errorBox');
    const stickerWrap= document.getElementById('stickerWrap');
    const actionBtns = document.getElementById('actionBtns');
    const titleEl    = document.getElementById('resultTitle');

    section.classList.add('visible');
    loadWrap.classList.remove('show');
    errBox.classList.remove('show');
    stickerWrap.classList.remove('show');
    actionBtns.classList.remove('show');

    if (mode === 'loading') {
      titleEl.textContent = c.loading;
      loadWrap.classList.add('show');
      section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } else if (mode === 'result') {
      titleEl.textContent = c.ready;
      stickerWrap.classList.add('show');
      actionBtns.classList.add('show');
    } else if (mode === 'error') {
      titleEl.textContent = c.oops;
      errBox.textContent = `😬 ${message}`;
      errBox.classList.add('show');
      actionBtns.classList.add('show');
    }
  }

  /* ─────────────── Actions ─────────────── */
  function downloadSticker() {
    const img = document.getElementById('stickerImg');
    const a = document.createElement('a');
    a.href = img.src;
    a.download = `stickerdrop-${state.vibe}-${Date.now()}.png`;
    a.click();
  }

  function tryAgain() { generate(); }

  function startOver() {
    state.lang    = null;
    state.vibe    = null;
    state.message = '';

    document.getElementById('cardEN').classList.remove('active');
    document.getElementById('cardAR').classList.remove('active');
    document.querySelectorAll('.vibe-card').forEach(c => c.classList.remove('active'));
    document.getElementById('step1Block').classList.remove('complete');
    document.getElementById('step2Block').classList.remove('complete');
    document.getElementById('step2Reveal').classList.remove('visible');
    document.getElementById('step3Reveal').classList.remove('visible');
    document.getElementById('genReveal').classList.remove('visible');
    document.getElementById('resultSection').classList.remove('visible');
    document.getElementById('stickerImg').src = '';
    document.getElementById('msgInput').value = '';

    // Reset to English
    document.getElementById('htmlRoot').lang = 'en';
    document.body.dir = 'ltr';
    applyCopy('EN');

    updateBtn();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ── Go ── */
  init();
</script>
</body>
</html>
